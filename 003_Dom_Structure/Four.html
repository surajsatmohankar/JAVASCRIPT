<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Extension of Dom</title>
</head>
<body style="background-color: #212121; color: #ffff;">
    <!-- <div class="parent">
        <div class="child">Child 1</div>
        <div class="child">Child 2</div>
        <div class="child">Child 3</div>
    </div> -->
    <ul class ="languages">
        <li>JavaScript</li>
        <li>Python</li>
        <li>Java</li>
    </ul>
</body>
<script>
    // function addLanguage(langName){
    //     const li = document.createElement('li');
    //     li.innerHTML = `${langName}`;
    //     document.querySelector('.languages').appendChild(li);
    // }

    //Optimized code for the above function

    function addoptimalLanguage(langName){
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(langName));
        document.querySelector('.languages').appendChild(li);
    }
    addoptimalLanguage('C++');
    addoptimalLanguage('dotNet');
    addoptimalLanguage('Ruby');

    //EDITED CODE
    const secondLang = document.querySelector("li:nth-child(2)");
    // secondLang.innerHTML = "React JS";
    const newli = document.createElement('li');
    newli.textContent = "MOJO"
    secondLang.replaceWith(newli);

    //EDIT
    const firstLang = document.querySelector('li:nth-child(1)');
    firstLang.outerHTML ='<li>TypeScript</li>'

    // remove
    const lastLang = document.querySelector('li:last-child');
    lastLang.remove();
</script>

</html>
