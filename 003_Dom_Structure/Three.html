<script>
    const div = document.createElement('div');
    console.log(div);
    div.className = "main"
    div.id = Math.round(Math.random() * 10 + 1);
    div.setAttribute("title", "Ths is the title for the div");
    div.style.backgroundColor = "green";
    div.style.padding = "20px";
    // div.innerText = "this is the real Dom"
    const addText = document.createTextNode("This is the real Dom");
    div.appendChild(addText);
    document.body.appendChild(div);
</script>
</html>
